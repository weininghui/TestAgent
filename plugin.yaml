# SDK Forge — OpenCode Plugin
# Auto-registers the MCP server and skill for OpenCode.

name: sdk-forge
description: SDK Forge — auto-generate GTest test suites from C/C++ SDK headers
version: 5.8.0

# MCP server configuration
mcp:
  server: python run_mcp.py
  transport: stdio

# Skills this plugin provides
skills:
  - name: sdk-forge
    description: |
      Scan C/C++ SDK headers, design test cases, generate GTest code,
      compile, run, and report results — all using OpenCode's built-in
      model. No external API keys required.
