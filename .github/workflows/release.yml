name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pyyaml
          pip install -e .

      - name: Run unit tests
        run: python -m pytest tests/ -v -k "not TestCompileAndRun and not TestCoveragePipeline and not TestCliIntegration"

      - name: Bench metrics smoke
        run: forge bench --project-dir examples/yaml_cpp_bench --no-build --no-clean

  release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release body
        run: |
          TAG="${GITHUB_REF_NAME}"
          FILE="docs/releases/RELEASE_NOTES_${TAG}.md"
          if [ -f "$FILE" ]; then
            cp "$FILE" release_body.md
          else
            echo "Release ${TAG}" > release_body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: false
