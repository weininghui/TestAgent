name: "SDK AI Testing Pipeline"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    name: Validate pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests (no LLM)
        run: |
          python -m pytest tests/ -v

      - name: Validate CLI dry-run
        run: |
          python cli.py --sdk-root test_sdk --dry-run --verbose

  generate-and-build:
    name: Generate & build C++ tests
    runs-on: ubuntu-latest
    if: github.repository_owner == 'SciVision' && vars.ENABLE_FULL_PIPELINE == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install C++ build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++

      - name: Run AI pipeline (requires OPENAI_API_KEY)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python cli.py --sdk-root test_sdk --model default --verbose

      - name: List generated files
        run: |
          echo "=== Generated GTest source files ==="
          ls -la output/generated/ || echo "output/generated/ not found"
          echo "=== Report ==="
          ls -la output/report.* 2>/dev/null || echo "report files not found"

      - name: Build generated tests
        run: |
          mkdir -p build
          cd build
          cmake -G Ninja "${{ github.workspace }}/output/generated" -DCMAKE_BUILD_TYPE=Debug
          ninja 2>&1 || echo "Build completed with warnings"

      - name: Run generated C++ tests
        run: |
          cd build
          ctest --output-on-failure -V 2>&1 || echo "Tests completed"

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            output/generated/
            output/report.md
            output/report.json

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/CMakeFiles/
            build/CMakeCache.txt
