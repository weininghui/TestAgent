name: SDK Test Forge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Run unit tests
        run: python -m pytest test_mcp_server.py -v -k "not TestCompileAndRun and not TestCoveragePipeline and not TestCliIntegration"

  integration-linux:
    name: C++ integration (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache GTest FetchContent
        uses: actions/cache@v4
        with:
          path: ~/.cache/sdk-test-forge
          key: gtest-${{ runner.os }}-v1.14.0-${{ hashFiles('sdk_forge/build.py') }}
          restore-keys: |
            gtest-${{ runner.os }}-v1.14.0-

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config lcov

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Run integration tests
        env:
          FORGE_GTEST_CACHE: ${{ runner.temp }}/sdk-test-forge-gtest
        run: |
          python -m pytest test_mcp_server.py -v -k "TestCompileAndRun or TestCliIntegration or TestCoveragePipeline"
          forge scan test_sdk --no-clang

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: "**/coverage_html/**"
          if-no-files-found: ignore

  integration-windows:
    name: C++ integration (Windows MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache GTest FetchContent
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/sdk-test-forge-gtest
          key: gtest-${{ runner.os }}-v1.14.0-${{ hashFiles('sdk_forge/build.py') }}
          restore-keys: |
            gtest-${{ runner.os }}-v1.14.0-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Run integration tests (Windows)
        env:
          FORGE_GTEST_CACHE: ${{ runner.temp }}/sdk-test-forge-gtest
        run: |
          python -m pytest test_mcp_server.py -v -k "TestCompileAndRun and not pkg_config and not test_medium"
          python -m pytest test_mcp_server.py -v -k TestCliIntegration

  scan-clang:
    name: libclang scan (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LLVM and libclang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install libclang pytest pytest-asyncio
          pip install -e .

      - name: Run clang tests
        run: |
          python -m pytest test_mcp_server.py -v -k TestParseHeaderClang
          forge scan test_sdk_cpp/include --no-cache
