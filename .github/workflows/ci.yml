name: SDK Forge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Run unit tests
        run: python -m pytest tests/ -v -k "not TestCompileAndRun and not TestCoveragePipeline and not TestCliIntegration"

      - name: Bench metrics (no build)
        run: forge bench --project-dir examples/yaml_cpp_bench --no-build --no-clean

      - name: Assertion quality smoke
        run: forge assert-quality --project-dir examples/yaml_cpp_bench

  integration-linux:
    name: C++ integration (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache GTest FetchContent
        uses: actions/cache@v4
        with:
          path: ~/.cache/sdk-forge
          key: gtest-${{ runner.os }}-v1.14.0-${{ hashFiles('sdk_forge/build.py') }}
          restore-keys: |
            gtest-${{ runner.os }}-v1.14.0-

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config lcov

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Run integration tests
        env:
          FORGE_GTEST_CACHE: ${{ runner.temp }}/sdk-forge-gtest
        run: |
          python -m pytest tests/ -v -k "TestCompileAndRun or TestCliIntegration or TestCoveragePipeline or TestE2EPipeline"
          forge scan examples/test_sdk --no-clang

      - name: Sanitizer smoke (ASan)
        env:
          FORGE_GTEST_CACHE: ${{ runner.temp }}/sdk-forge-gtest-asan
        run: |
          cmake -S examples/test_sdk -B examples/test_sdk/build
          cmake --build examples/test_sdk/build
          mkdir -p /tmp/forge_asan/tests /tmp/forge_asan/build
          cp examples/test_sdk/examples/calc_test.cpp /tmp/forge_asan/tests/
          forge compile /tmp/forge_asan/tests /tmp/forge_asan/build \
            --include examples/test_sdk/include \
            --lib-dir examples/test_sdk/build \
            --link calc --no-config --sanitizer asan

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: "**/coverage_html/**"
          if-no-files-found: ignore

  integration-windows:
    name: C++ integration (Windows MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache GTest FetchContent
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/sdk-forge-gtest
          key: gtest-${{ runner.os }}-v1.14.0-${{ hashFiles('sdk_forge/build.py') }}
          restore-keys: |
            gtest-${{ runner.os }}-v1.14.0-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
          pip install -e .

      - name: Run integration tests (Windows)
        env:
          FORGE_GTEST_CACHE: ${{ runner.temp }}/sdk-forge-gtest
        run: |
          python -m pytest tests/ -v -k "TestCompileAndRun and not pkg_config and not test_medium"
          python -m pytest tests/ -v -k TestCliIntegration

  scan-clang:
    name: libclang scan (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LLVM and libclang
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install libclang pytest pytest-asyncio
          pip install -e .

      - name: Run clang tests
        run: |
          python -m pytest tests/ -v -k TestParseHeaderClang
          forge scan examples/test_sdk_cpp/include --no-cache
