# ──────────────────────────────────────────────────────────────────────────────
# Model Configuration — LLM Presets
# ──────────────────────────────────────────────────────────────────────────────
# This file defines model presets available via:
#   CLI:  python app.py --model <preset_name>
#   API:  agents.models.get_llm("<preset_name>")
#
# To add a custom preset, just add a new entry below.  No Python code changes
# are needed.
#
# Local overrides (not tracked in git):
#   Create a model_config.local.yaml in the same directory with the same
#   structure — it will be merged on top of this file.
# ──────────────────────────────────────────────────────────────────────────────

presets:

  longcat:
    description: "LongCat-2.0-Preview (default)"
    model: "LongCat-2.0-Preview"
    base_url: "https://api.longcat.chat/openai/v1"
    api_key_env: "OPENAI_API_KEY"
    temperature: 0.1
    max_tokens: 16000
    timeout: 1200

  dashscope:
    description: "kimi-k2.5 via Aliyun DashScope"
    model: "kimi-k2.5"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key_env: "OPENAI_API_KEY"
    temperature: 0.2
    max_tokens: 30000
    timeout: 1200

  # ── Add your custom presets below ─────────────────────────────────────────
  # example:
  #   model: "gpt-4o"
  #   base_url: "https://api.openai.com/v1"
  #   api_key_env: "OPENAI_API_KEY"
  #   temperature: 0.0
  #   max_tokens: 4096
  #   timeout: 600
