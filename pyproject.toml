[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "auto_test_agent"
version = "1.0.0"
description = "SDK Test Generation Agent — automated C/C++ test case generation"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["sdk", "test-generation", "gtest", "llm", "langchain", "opencode"]
authors = [
    { name = "auto_test_agent" },
]

dependencies = [
    "langchain>=0.3.0",
    "langchain-openai>=0.2.0",
    "langchain-community>=0.3.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "tenacity>=8.0.0",
    "mcp>=1.28.0",
    "tomli>=2.0.0; python_version<'3.11'",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[project.urls]
Homepage = "https://github.com/your-org/auto_test_agent"

[project.scripts]
testgen-mcp = "mcp_server:main"

[tool.setuptools.packages.find]
include = ["agents*", "schemas*"]

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.toml", "*.json", "*.md"]
